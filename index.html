        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.5s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.6s ease-out forwards; }

            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }

        }
        .float-icon {
            position: absolute;
            opacity: 0;
            animation: floatUp linear infinite;
            z-index: -1;
        }

        
        .progress-stripes {
            background-image: linear-gradient(

                rgba(255, 255, 255, 0.15) 25%,
                transparent 25%,
                transparent 50%,

                    const iconBgClasses = isUnlocked ? "bg-slate-900/50" : "bg-slate-700/80";
                    const iconHtml = isUnlocked 
                        ? `<i data-lucide="${memory.icon}" class="w-8 h-8 ${memory.textColorClass}"></i>`
                        : `<i data-lucide="lock" class="w-8 h-8 text-slate-500"></i>`;
                    const titleClass = isUnlocked ? memory.textColorClass : "text-slate-500";
                    
                    return `
                        <div onclick="unlockMemory(${memory.id})" class="${baseClasses} ${activeClasses}">
                            <div class="flex items-start gap-4">
                                <div class="p-3 rounded-lg ${iconBgClasses} transition-colors border border-white/5">
                                    ${iconHtml}
                                </div>
                                <div>
                                    <h3 class="text-xl font-bold mb-1 ${titleClass}">
                                        ${isUnlocked ? memory.title : 'Достижение заблокировано'}
                                    </h3>
                                    <p class="text-slate-400 text-sm font-medium">
                                        ${isUnlocked ? memory.game : 'Кликните, чтобы разблокировать'}
                                    </p>
                                </div>
                            </div>
                            ${isUnlocked ? `<div class="absolute top-4 right-4 text-emerald-400 animate-zoom-in drop-shadow-[0_0_8px_rgba(52,211,153,0.5)]"><i data-lucide="check-circle-2" class="w-6 h-6"></i></div>` : ''}
                        </div>
                    `;
                }).join('');

                html = `
                    <div class="max-w-6xl w-full animate-slide-up">
                        <div class="text-center mb-10">
                            <h2 class="text-4xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-400 tracking-tight">
                                ДОСТИЖЕНИЯ СОВМЕСТНЫХ ИГР
                            </h2>
                            <p class="text-slate-400 text-lg mb-6">
                                Разблокируй все воспоминания, чтобы получить Платиновый Трофей!
                            </p>
                            
                            <!-- Стилизованный прогресс-бар -->
                            <div class="inline-flex flex-col items-center gap-2 bg-slate-800/80 backdrop-blur-sm p-4 rounded-xl border border-slate-700 shadow-xl min-w-[300px]">
                                <div class="flex justify-between w-full text-sm font-bold text-slate-300 uppercase tracking-wider">
                                    <span>Прогресс</span>
                                    <span class="${allUnlocked ? 'text-emerald-400' : 'text-fuchsia-400'}">${unlockedMemories.length}/${memories.length}</span>
                                </div>
                                <div class="w-full h-4 bg-slate-900 rounded-full overflow-hidden border border-slate-700 shadow-inner p-0.5">
                                    <div class="h-full rounded-full transition-all duration-700 relative overflow-hidden bg-gradient-to-r from-fuchsia-600 to-cyan-500" style="width: ${progress}%">
                                        <div class="absolute inset-0 progress-stripes opacity-30 animate-[slide_1s_linear_infinite]"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                            ${cardsHtml}
                        </div>

                        ${allUnlocked ? `
                            <div class="flex justify-center animate-slide-up mb-10">
                                <button onclick="setScreen('final')" class="py-4 px-10 bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 text-white font-black rounded-xl text-xl transition-all transform hover:scale-105 active:scale-95 flex items-center gap-3 shadow-[0_0_30px_rgba(16,185,129,0.5)] border border-emerald-300/50">
                                    <i data-lucide="trophy" class="w-7 h-7"></i> ПОЛУЧИТЬ НАГРАДУ!
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            } 
            // ЭКРАН 3: Финальное поздравление
            else if (currentScreen === 'final') {
                html = `
                    <div class="max-w-3xl w-full text-center animate-zoom-in">
                        <div class="text-6xl mb-8 flex justify-center gap-6">
                            <i data-lucide="sparkles" class="w-16 h-16 text-yellow-400 animate-bounce" style="animation-delay: 75ms;"></i>
                            <i data-lucide="award" class="w-20 h-20 text-fuchsia-400 animate-bounce" style="animation-delay: 150ms;"></i>
                            <i data-lucide="crown" class="w-16 h-16 text-cyan-400 animate-bounce" style="animation-delay: 300ms;"></i>
                        </div>
                        
                        <h1 class="text-5xl md:text-7xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 via-cyan-400 to-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)] tracking-tighter">
                            ПЛАТИНА ПОЛУЧЕНА!
                        </h1>
                        <p class="text-xl text-emerald-400 font-bold tracking-widest uppercase mb-10 drop-shadow-md">Achievement Unlocked: Идеальный тиммейт</p>
                        
                        <div class="bg-slate-800/90 backdrop-blur-md border-2 border-slate-600 rounded-3xl p-8 md:p-12 shadow-[0_0_50px_rgba(0,0,0,0.5)] relative overflow-hidden text-left">
                            <div class="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-fuchsia-500 via-yellow-400 to-cyan-500"></div>
                            
                            <h2 class="text-3xl font-black mb-8 text-white text-center">
                                С Днем Рождения! 💛
                            </h2>
                            
                            <div class="space-y-6 text-lg text-slate-300 leading-relaxed">
                                <p>
                                    Мы закрыли столько невероятных квестов вместе и каждый из них — это отдельное теплое воспоминание. С тобой совершенно не страшно выживать ни в каких мирах. Убегать от жутких маньяков, часами бить боссов в забавных костюмах уточек или пытаться не сойти с ума над очередной загадкой с часами — с тобой всё это превращается в самый лучший вечер.
                                </p>
                                <p>
                                    Ты правда самый лучший, понимающий и родной напарник по коопу, о котором можно только мечтать. Даже когда мы творим какую-то нелепую дичь, жутко тупим или я покорно позирую, пока меня ест медведь — мы всегда смеемся до слез. А наша традиция забить на любую надвигающуюся катастрофу, улыбнуться и сказать «Так, падажи. Сфоткаемся!» — делает каждый наш скриншот самым ценным, согревающим душу лутом в моей коллекции.
                                </p>
                                <p class="space-y-6 text-lg text-slate-300 leading-relaxed">
                                    Официально анонсирую запуск твоего личного, масштабного и очень счастливого DLC «Новый Год Жизни»! Желаю, чтобы в нем было поменьше багов, пинг всегда держался на нуле, жизненная стамина восстанавливалась мгновенно(желательно от вкусного кофе и хорошего сна),а удача всегда была прокачана на максимум. Впереди у нас еще столько непройденных миров и таких уютных, ламповых вечеров в Discord. Я всегда готов нажать кнопку готовности, куда бы мы ни отправились!
                                </p>
                            </div>

                            <div class="mt-10 flex flex-wrap justify-center gap-4">
                                <div class="inline-flex items-center gap-2 bg-slate-900/80 px-6 py-3 rounded-xl border border-fuchsia-500/50 shadow-[0_0_15px_rgba(217,70,239,0.2)]">
                                    <i data-lucide="gamepad-2" class="w-5 h-5 text-fuchsia-400"></i>
                                    <span class="font-medium text-slate-200">Статус: <span class="text-fuchsia-400 font-bold">Готов к новым играм!</span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            app.innerHTML = html;

            // Модальное окно (когда кликаем на ачивку)
            if (selectedMemory) {
                const imagesCount = selectedMemory.images ? selectedMemory.images.length : 0;
                const videosCount = selectedMemory.videos ? selectedMemory.videos.length : 0;
                const totalMediaCount = imagesCount + videosCount;
                
                let mediaContentHtml = '';
                if (totalMediaCount > 0) {
                    mediaContentHtml = getMediaHtml(selectedMemory, currentImageIndex);
                } else {
                    mediaContentHtml = `<div class="text-slate-500 text-center px-8 border-2 border-dashed border-slate-700/50 rounded-xl py-12 mx-6 bg-slate-900/50 backdrop-blur-sm">
                        <i data-lucide="image" class="w-16 h-16 mx-auto mb-4 text-slate-600 opacity-50"></i>
                        <p class="text-sm font-medium tracking-wide uppercase">${selectedMemory.imagePlaceholder}</p>
                       </div>`;
                }

                const hasMultipleMedia = totalMediaCount > 1;

                const modalHtml = `
                    <div id="modal-backdrop" onclick="closeModal(event)" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4 md:p-8 z-50 animate-fade-in">
                        <div class="bg-slate-800 border border-slate-600 rounded-2xl max-w-4xl w-full max-h-[95vh] flex flex-col overflow-hidden shadow-2xl animate-zoom-in ring-1 ring-white/10" onclick="event.stopPropagation()">
                            
                            <div class="relative w-full aspect-video bg-black flex items-center justify-center border-b border-slate-700 overflow-hidden group shrink-0">
                                
                                <div id="media-container" class="w-full h-full absolute inset-0 flex items-center justify-center">
                                    ${mediaContentHtml}
                                </div>
                                
                                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/60 p-2 rounded-full text-white hover:bg-slate-700 transition-colors backdrop-blur-md z-20 border border-white/20 hover:scale-110">
                                    <i data-lucide="x" class="w-6 h-6"></i>
                                </button>

                                ${hasMultipleMedia ? `
                                    <button onclick="prevImage(event)" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/60 p-3 rounded-full text-white hover:bg-slate-700 transition-all backdrop-blur-md z-10 opacity-0 md:opacity-100 group-hover:opacity-100 border border-white/20 hover:scale-110">
                                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                                    </button>
                                    
                                    <button onclick="nextImage(event)" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/60 p-3 rounded-full text-white hover:bg-slate-700 transition-all backdrop-blur-md z-10 opacity-0 md:opacity-100 group-hover:opacity-100 border border-white/20 hover:scale-110">
                                        <i data-lucide="chevron-right" class="w-6 h-6"></i>
                                    </button>

                                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-3 z-10 bg-black/40 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
                                        ${Array.from({length: totalMediaCount}).map((_, idx) => `
                                            <button onclick="setImage(${idx}, event)" class="carousel-dot w-3 h-3 rounded-full transition-all duration-300 ${idx === currentImageIndex ? 'bg-white scale-125' : 'bg-white/40 hover:bg-white/70'}"></button>
                                        `).join('')}
                                    </div>
                                ` : ''}
                            </div>

                            <div class="p-6 md:p-8 overflow-y-auto bg-gradient-to-b from-slate-800 to-slate-900 relative">
                                <div class="absolute top-0 right-0 w-32 h-32 opacity-5 pointer-events-none">
                                    <i data-lucide="${selectedMemory.icon}" class="w-full h-full"></i>
                                </div>
                                <div class="flex items-center gap-4 mb-4">
                                    <div class="p-3 bg-slate-900/80 rounded-xl border border-slate-700 shadow-inner">
                                        <i data-lucide="${selectedMemory.icon}" class="w-8 h-8 ${selectedMemory.textColorClass}"></i>
                                    </div>
                                    <h3 class="text-2xl md:text-4xl font-black ${selectedMemory.textColorClass} tracking-tight">
                                        ${selectedMemory.title}
                                    </h3>
                                </div>
                                <div class="mb-5 inline-block px-4 py-1.5 bg-slate-950/80 rounded-lg border border-slate-700/50 shadow-inner">
                                    <span class="text-xs font-black text-slate-300 uppercase tracking-widest">${selectedMemory.game}</span>
                                </div>
                                <p class="text-slate-300 text-lg md:text-xl leading-relaxed font-medium relative z-10">
                                    ${selectedMemory.desc}
                                </p>
                                
                                ${selectedMemory.audio ? `
                                    <div class="mt-8 border-t border-slate-700/50 pt-6">
                                        <button id="audio-toggle-btn" onclick="toggleAudio(event)" class="inline-flex items-center gap-3 bg-gradient-to-r from-fuchsia-600 to-fuchsia-500 hover:from-fuchsia-500 hover:to-fuchsia-400 text-white font-bold px-6 py-3 rounded-xl transition-all shadow-[0_0_20px_rgba(217,70,239,0.3)] active:scale-95 border border-fuchsia-400/50">
                                            <i data-lucide="music" class="w-5 h-5"></i>
                                            <span>Включить саундтрек</span>
                                        </button>
                                    </div>
                                ` : ''}
                            </div>
                            
                        </div>
                    </div>
                `;
                app.insertAdjacentHTML('beforeend', modalHtml);
            }

            
            lucide.createIcons();
        }

        function updateCarouselUI() {
            const container = document.getElementById('media-container');
            if (container && selectedMemory) {
                // Обновляем содержимое (фото или видео)
                container.innerHTML = getMediaHtml(selectedMemory, currentImageIndex);
            }
            
            const dots = document.querySelectorAll('.carousel-dot');
            dots.forEach((dot, idx) => {
                if (idx === currentImageIndex) {
                    dot.className = 'carousel-dot w-3 h-3 rounded-full transition-all duration-300 bg-white scale-125';
                } else {
                    dot.className = 'carousel-dot w-3 h-3 rounded-full transition-all duration-300 bg-white/40 hover:bg-white/70';
                }
            });
        }

        // Функции управления
        window.setScreen = function(screen) {
            currentScreen = screen;
            render();
        };

        window.unlockMemory = function(id) {
            if (!unlockedMemories.includes(id)) {
                unlockedMemories.push(id);
            }
            
            selectedMemory = memories.find(m => m.id === id);
            currentImageIndex = 0;

            render();
        };

        window.closeModal = function(e) {
            if (!e || e.target.id === 'modal-backdrop' || e.target.closest('button[onclick="closeModal()"]')) {
                selectedMemory = null;
                stopCardAudio(); 
                render();
            }
        };

        // Функции карусели
        window.prevImage = function(e) {
            e.stopPropagation();
            if (!selectedMemory) return;
            
            const imagesCount = selectedMemory.images ? selectedMemory.images.length : 0;
            const videosCount = selectedMemory.videos ? selectedMemory.videos.length : 0;
            const totalMediaCount = imagesCount + videosCount;
            
            if (totalMediaCount === 0) return;

            currentImageIndex = (currentImageIndex - 1 + totalMediaCount) % totalMediaCount;
            updateCarouselUI(); 
        };

        window.nextImage = function(e) {
            e.stopPropagation(); 
            if (!selectedMemory) return;
            
            const imagesCount = selectedMemory.images ? selectedMemory.images.length : 0;
            const videosCount = selectedMemory.videos ? selectedMemory.videos.length : 0;
            const totalMediaCount = imagesCount + videosCount;
            
            if (totalMediaCount === 0) return;

            currentImageIndex = (currentImageIndex + 1) % totalMediaCount;
            updateCarouselUI();
        };

        window.setImage = function(index, e) {
            e.stopPropagation();
            currentImageIndex = index;
            updateCarouselUI();
        };

        
        render();
    </script>
</body>
</html>
